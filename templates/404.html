{% extends 'base.html' %}

{% block title %}Страница не найдена — JobGuard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7 col-xl-6">
        <div class="card error-card text-center">
            <div class="card-body p-4 p-lg-5">
                <div class="error-code mb-2">404</div>
                <div class="error-icon mb-3">
                    <i class="bi bi-search"></i>
                </div>
                <h1 class="h3 fw-bold mb-2">Страница не найдена</h1>
                <p class="text-muted mb-4">
                    Такой страницы, заказа, профиля или диалога нет. Возможно, ссылка устарела или объект был удалён.
                </p>

                <div class="d-flex flex-wrap justify-content-center gap-2">
                    <a href="{{ url_for('index') }}" class="btn btn-primary rounded-3">
                        <i class="bi bi-house-door me-1"></i>На главную
                    </a>
                    <a href="{{ url_for('orders_list') }}" class="btn btn-outline-primary rounded-3">
                        Смотреть заказы
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
